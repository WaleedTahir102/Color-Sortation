site_name: Color Sortation Documentation
site_description: Documentation for color sortation episode collection and robot training using the Trossen Mobile AI Robot
site_author: Team Project Documentation

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Overview: 01_overview.md
  - System Requirements: 02_system_requirements.md
  - Setup: 03_setup.md
  - Data Collection UI: 04_data_collection_ui.md
  - Episode Collection: 05_episode_collection.md
  - Dataset Organization: 06_dataset_organization.md
  - Hugging Face Storage: 07_huggingface_storage.md
  - Training Preparation: 08_training_preparation.md
  - Troubleshooting: 09_troubleshooting.md
  - Changelog: 10_changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
